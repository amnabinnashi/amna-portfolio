<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amna Bin Nashi</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Outfit',sans-serif;
}

body{
  background:#f4f4f1;
  color:#1a1a1a;
}

/* HERO */
.hero{
  background:linear-gradient(135deg,#3f7f81,#5fa3a5);
  color:#fff;
  text-align:center;
  padding:60px 20px;
  position:relative;
}

/* SHAPE */
.hero-shape{
  width:150px;
  height:200px;
  background:#fff;
  border-radius:80px;
  margin:20px auto;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.hero-shape span{
  font-size:40px;
  font-weight:700;
  color:#3f7f81;
}

.hero h1{
  font-size:24px;
}

.hero p{
  font-size:14px;
  opacity:0.9;
  margin-top:5px;
}

/* BUTTONS */
.actions{
  margin-top:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.btn{
  padding:14px;
  border-radius:12px;
  text-decoration:none;
  font-size:14px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  transition:0.3s;
}

.email{
  background:#fff;
  color:#3f7f81;
  font-weight:600;
}

.link{
  background:rgba(255,255,255,0.2);
  color:#fff;
}

.btn:hover{
  transform:translateY(-3px);
}

/* SECTION */
.section{
  padding:30px 20px;
  text-align:center;
}

.section h2{
  margin-bottom:20px;
}

/* ICON CARDS */
.features{
  display:flex;
  gap:15px;
  flex-wrap:wrap;
  justify-content:center;
}

.feature{
  background:#fff;
  padding:15px;
  border-radius:15px;
  width:120px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.feature i{
  font-size:20px;
  color:#3f7f81;
  margin-bottom:8px;
}

/* TIMELINE */
.timeline{
  padding:20px;
}

.item{
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
  text-align:left;
  border-left:4px solid #3f7f81;
}

/* FOOTER */
.footer{
  text-align:center;
  padding:20px;
  font-size:12px;
  color:#777;
}
</style>

</head>

<body>

<!-- HERO -->
<div class="hero">

  <div class="hero-shape">
    <span>A</span>
  </div>

  <h1>Amna Bin Nashi</h1>
  <p>Software Engineer | UI/UX | AI/ML</p>

  <div class="actions">
    <a href="mailto:amnabinnashi2000@gmail.com" class="btn email">
      <i class="fa-solid fa-envelope"></i> Email
    </a>

    <a href="https://www.linkedin.com/in/amna-bin-nashi-958a563a3" class="btn link">
      <i class="fa-brands fa-linkedin"></i> LinkedIn
    </a>

    <a href="https://github.com/amnabinnashi" class="btn link">
      <i class="fa-brands fa-github"></i> GitHub
    </a>
  </div>

</div>

<!-- FEATURES -->
<div class="section">
  <h2>What I Do</h2>

  <div class="features">
    <div class="feature">
      <i class="fa-solid fa-code"></i>
      <p>Development</p>
    </div>

    <div class="feature">
      <i class="fa-solid fa-pen-ruler"></i>
      <p>UI/UX</p>
    </div>

    <div class="feature">
      <i class="fa-solid fa-brain"></i>
      <p>AI/ML</p>
    </div>
  </div>
</div>

<!-- EXPERIENCE -->
<div class="section">
  <h2>Experience</h2>

  <div class="timeline">
    <div class="item">
      <h3>Product Designer & Developer</h3>
      <p>Nexa Solutions • 2026 - Present</p>
    </div>

    <div class="item">
      <h3>UI/UX Designer</h3>
      <p>Freelance • 2024 - 2026</p>
    </div>
  </div>
</div>

<div class="footer">
© 2026 Amna Bin Nashi — All Rights Reserved
</div>

</body>
</html>
